version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - 'next'
          - '@next/*'
          - 'eslint-config-next'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
      radix:
        patterns:
          - '@radix-ui/*'
      tooling:
        patterns:
          - 'eslint*'
          - 'prettier*'
          - 'typescript'
          - 'vitest*'
          - '@vitest/*'
          - '@testing-library/*'
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(ci)'
