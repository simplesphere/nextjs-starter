version: 2
updates:
  # NOTE: npm ecosystem is intentionally NOT enabled. Dependabot does not yet
  # update `bun.lock` (see dependabot/dependabot-core#6528), so its npm PRs
  # leave package.json and the lockfile out of sync and CI fails on
  # `bun install --frozen-lockfile`. Use Renovate (bun-aware) if you want
  # automated npm bumps; this config keeps GitHub Actions on autopilot only.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(ci)'
